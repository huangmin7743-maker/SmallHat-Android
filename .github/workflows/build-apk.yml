name: Build SmallHat APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          chmod +x gradlew 2>/dev/null || true
          echo "android.sdk.root=/usr/lib/android-sdk" > local.properties || true
          ./gradlew assembleDebug --no-daemon 2>&1 || echo "Gradle wrapper not found, trying direct"
          if [ ! -f gradlew ]; then
            apt-get update && apt-get install -y gradle 2>/dev/null
            gradle assembleDebug 2>&1 || gradle build 2>&1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmallHat-APK
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/*.apk
          retention-days: 30
