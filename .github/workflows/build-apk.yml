name: Build SmallHat APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          mkdir -p $HOME/android-sdk
          echo "sdk.dir=$HOME/android-sdk" > local.properties

      - name: Build with Gradle
        run: |
          # The system Gradle is at /usr/share/gradle-9.5.1/bin/gradle
          GRADLE=$(which gradle 2>/dev/null || echo "/usr/share/gradle-*/bin/gradle")
          echo "Using Gradle: $GRADLE"
          
          # Build the APK
          cd app
          # First try gradle wrapper, then system gradle
          if [ -f ../gradlew ]; then
            ../gradlew assembleDebug --no-daemon
          else
            gradle assembleDebug --no-daemon 2>&1 || gradle build --no-daemon 2>&1
          fi
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmallHat-APK
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/**/*.apk
          retention-days: 30
